<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú Torneo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>
    :root { --spacing: 1rem; }
    body { padding: 1rem; }
    .comensal-card { border: 1px solid #ccc; padding: 1rem; margin-bottom: 1.5rem; border-radius: 8px; background: #f9f9f9; }
    .comensal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .btn-remove { background: #d32f2f !important; border: none; padding: 0.2rem 0.5rem; width: auto; }
    .sticky-bottom { position: sticky; bottom: 0; background: white; padding: 1rem 0; border-top: 1px solid #eee; z-index: 100; }
    select, input { margin-bottom: 0.5rem !important; }
    label { font-weight: bold; font-size: 0.9rem; margin-top: 0.5rem; }
    h4 { margin-bottom: 0.5rem; color: #106ebe; }
    
    /* Estilos para el Loading */
    #loading-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.8);
      z-index: 999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #106ebe;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Conectando con Google Sheets...</p>
  </div>

  <main class="container">
    <header>
      <h1>🍴 Menú Torneo</h1>
      <p>Selecciona tu nombre y el de tus acompañantes.</p>
    </header>

    <section id="form-container">
      <label for="select-jugador">Jugador Principal</label>
      <select id="select-jugador" onchange="cargarDatosPrevios()">
        <option value="">Cargando jugadores...</option>
      </select>

      <div id="lista-comensales"></div>

      <button class="outline" onclick="addComensal('Acompañante')">+ Añadir Acompañante</button>

      <hr>

      <div class="sticky-bottom">
        <button id="btn-enviar" onclick="enviarFormulario()">Enviar Elecciones</button>
      </div>
    </section>
  </main>

  <script>
    function showLoading(msg) {
      document.getElementById('loading-overlay').style.display = 'flex';
      if (msg) document.querySelector('#loading-overlay p').innerText = msg;
    }

    function hideLoading() {
      document.getElementById('loading-overlay').style.display = 'none';
    }

window.onload = () => {
  const select = document.getElementById('select-jugador');
  select.disabled = true; // Bloqueamos mientras carga
  select.innerHTML = '<option value="">Cargando jugadores...</option>';

  showLoading("Cargando lista de jugadores...");

  google.script.run
    .withSuccessHandler(list => {
      hideLoading();
      select.disabled = false; // Desbloqueamos

      if (list.length > 0 && list[0].startsWith("Error:")) {
        alert(list[0]);
        select.innerHTML = '<option value="">Error de configuración</option>';
        return;
      }

      if (list.length === 0) {
        select.innerHTML = '<option value="">No hay jugadores inscritos</option>';
        return;
      }

      select.innerHTML = '<option value="">-- Elige tu nombre --</option>';
      list.forEach(name => {
        const option = document.createElement('option');
        option.value = name;
        option.text = name;
        select.appendChild(option);
      });
    })
    .withFailureHandler(err => {
      hideLoading();
      select.disabled = false;
      console.error(err);
      alert("Error al conectar con Google Sheets: " + err.message);
      select.innerHTML = '<option value="">Error de conexión</option>';
    })
    .getJugadores();
};

    let opcionesMenuGlobal = null;

    function addComensal(tipo, isFixed = false, datos = null) {
      if (tipo === 'Jugador') return;

      const container = document.getElementById('lista-comensales');
      const id = Date.now() + Math.floor(Math.random() * 1000);
      const div = document.createElement('div');
      div.className = 'comensal-card';
      div.id = `c-${id}`;
      
      const sel = (val, target) => (val && val.toString().trim() === target) ? 'selected' : '';
      
      // Función para generar las opciones del select dinámicamente
      const renderOptions = (tipoMenu, valorSeleccionado) => {
        if (!opcionesMenuGlobal || !opcionesMenuGlobal[tipoMenu]) return '<option value="">Sin opciones</option>';
        return opcionesMenuGlobal[tipoMenu].map(opt => 
          `<option value="${opt}" ${sel(valorSeleccionado, opt)}>${opt}</option>`
        ).join('');
      };

      div.innerHTML = `
        <div class="comensal-header">
          <h4>${tipo}</h4>
          <button class="btn-remove" onclick="document.getElementById('c-${id}').remove()">✕</button>
        </div>
        
        <label>Nombre completo</label>
        <input type="text" class="c-nombre" placeholder="Nombre" value="${datos ? datos.nombre : ''}">

        <div class="menu-options">
          <div class="grid">
            <div>
              <label>Cena Viernes</label>
              <select class="c-cenaV">
                ${renderOptions('cenaV', datos?.cenaV)}
              </select>
            </div>
            <div>
              <label>Postre Viernes</label>
              <select class="c-postreV">
                ${renderOptions('postreV', datos?.postreV)}
              </select>
            </div>
          </div>

          <label>Comida Sábado (1º, 2º, Postre)</label>
          <div class="grid">
            <select class="c-comidaS1">
              ${renderOptions('comidaS1', datos?.comidaS1)}
            </select>
            <select class="c-comidaS2">
              ${renderOptions('comidaS2', datos?.comidaS2)}
            </select>
            <select class="c-postreComidaS">
              ${renderOptions('postreComidaS', datos?.postreComidaS)}
            </select>
          </div>

          <div class="grid">
            <div>
              <label>Cena Sábado</label>
              <select class="c-cenaS">
                ${renderOptions('cenaS', datos?.cenaS)}
              </select>
            </div>
            <div>
              <label>Postre Cena Sábado</label>
              <select class="c-postreCenaS">
                ${renderOptions('postreCenaS', datos?.postreCenaS)}
              </select>
            </div>
          </div>

          <label>Picnic Domingo</label>
          <select class="c-picnicD">
            ${renderOptions('picnicD', datos?.picnicD)}
          </select>

          <label>Alergias o Comentarios (Individual)</label>
          <input type="text" class="c-observaciones" placeholder="Ej: Celíaco, sin lactosa..." value="${datos ? datos.observaciones : ''}">
        </div>
        <input type="hidden" class="c-tipo" value="${tipo}">
      `;
      container.appendChild(div);
    }

    function cargarDatosPrevios() {
      const nombre = document.getElementById('select-jugador').value;
      if (!nombre) return;

      showLoading("Buscando datos previos y menú...");

      google.script.run.withSuccessHandler(res => {
        hideLoading();
        document.getElementById('lista-comensales').innerHTML = '';
        
        // Guardamos las opciones del menú que vienen del servidor
        opcionesMenuGlobal = res.opciones;

        if (res.datos) {
          res.datos.comensales.forEach(c => {
            if (c.tipo === 'Acompañante') {
              addComensal(c.tipo, false, c);
            }
          });
        }
      })
      .withFailureHandler(err => {
        hideLoading();
        console.error(err);
        alert("Error al cargar datos: " + err.message);
      })
      .getDatosPrevios(nombre);
    }

    function enviarFormulario() {
      const btn = document.getElementById('btn-enviar');
      const nombreJugador = document.getElementById('select-jugador').value;

      if (!nombreJugador) {
        alert("Por favor, selecciona tu nombre.");
        return;
      }

      btn.disabled = true;
      btn.innerText = "Enviando...";

      const datos = {
        jugador: nombreJugador,
        comensales: []
      };

      datos.comensales.push({
        tipo: 'Jugador',
        nombre: nombreJugador,
        cenaV: 'N/A',
        postreV: 'N/A',
        comidaS1: 'N/A',
        comidaS2: 'N/A',
        postreComidaS: 'N/A',
        cenaS: 'N/A',
        postreCenaS: 'N/A',
        picnicD: 'N/A',
        observaciones: ''
      });

      document.querySelectorAll('.comensal-card').forEach(card => {
        datos.comensales.push({
          tipo: card.querySelector('.c-tipo').value,
          nombre: card.querySelector('.c-nombre').value,
          cenaV: card.querySelector('.c-cenaV').value,
          postreV: card.querySelector('.c-postreV').value,
          comidaS1: card.querySelector('.c-comidaS1').value,
          comidaS2: card.querySelector('.c-comidaS2').value,
          postreComidaS: card.querySelector('.c-postreComidaS').value,
          cenaS: card.querySelector('.c-cenaS').value,
          postreCenaS: card.querySelector('.c-postreCenaS').value,
          picnicD: card.querySelector('.c-picnicD').value,
          observaciones: card.querySelector('.c-observaciones').value
        });
      });

      google.script.run.withSuccessHandler(msg => {
        alert(msg);
        btn.disabled = false;
        btn.innerText = "Enviar Elecciones";
      }).guardarRespuestas(datos);
    }
  </script>
</body>
</html>
